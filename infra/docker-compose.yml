services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: glass_claims_db
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD before starting Postgres}
      POSTGRES_USER: glass_user
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
