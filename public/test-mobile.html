<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f0f0f0;
        }
        .status {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Mobile Connection Test</h1>
    <div id="results"></div>

    <script>
        const results = document.getElementById('results');
        
        function addResult(message, isError = false) {
            const div = document.createElement('div');
            div.className = 'status ' + (isError ? 'error' : 'success');
            div.textContent = message;
            results.appendChild(div);
        }

        async function runTests() {
            addResult('Starting tests...');
            
            try {
                addResult('Test 1: Fetching legal notice...');
                const response = await fetch('/api/consent/legal-notice');
                addResult(`Response status: ${response.status}`);
                
                const data = await response.json();
                addResult(`Data received: ${data.success ? 'SUCCESS' : 'FAILED'}`);
                
                if (data.success) {
                    addResult('✅ All tests passed!');
                } else {
                    addResult('❌ API returned error', true);
                }
            } catch (error) {
                addResult(`❌ Error: ${error.message}`, true);
                addResult(`Error type: ${error.name}`, true);
            }
        }

        // Run tests when page loads
        runTests();
    </script>
</body>
</html>
